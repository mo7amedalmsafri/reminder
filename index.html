
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>موقع التذكير</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="timer">00:00</div>
        <div class="inputs">
            <div class="input-group">
                <label for="alarmCount">عدد المنبهات:</label>
                <input type="number" id="alarmCount" min="1" max="10" value="3">
            </div>
            <div class="input-group">
                <label for="interval">الفاصل بين المنبهات (بالدقائق):</label>
                <input type="number" id="interval" min="1" max="120" value="1">
            </div>
            <div class="input-group">
                <label>صيغة الساعة:</label>
                <div class="time-toggle">
                    <button id="btn24" class="active">24 ساعة</button>
                    <button id="btn12">12 ساعة</button>
                </div>
            </div>
        </div>
        <button id="startButton">بدء التنبيه</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
